name: Deploy terms.spirzen.ru

on:
  push:
    branches: [main, master]
    paths:
      - 'sites/terms/**'
      - 'packages/**'
      - 'content/glossary/**'
      - 'ecosystem-urls.json'
      - '.github/workflows/deploy-terms.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-terms
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout it-knowledge-base
        uses: actions/checkout@v4
        with:
          repository: Spirzen/it-knowledge-base
          path: it-knowledge-base
          ref: main
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync glossary
        run: IT_KB_ROOT=./it-knowledge-base node packages/sync/sync-glossary.mjs
        continue-on-error: true

      - name: Build terms portal
        run: npm run build:terms
        env:
          IT_TERMS_SITE: https://terms.spirzen.ru
          IT_TERMS_BASE: /

      - uses: actions/upload-pages-artifact@v3
        with:
          path: sites/terms/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://terms.spirzen.ru/
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
