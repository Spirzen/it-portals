# Деплой lab / games / kids / tools на отдельные поддомены
# GitHub Pages: один custom domain на репозиторий — см. docs/DEPLOY.md

name: Deploy portal (manual)

on:
  workflow_dispatch:
    inputs:
      site:
        description: Portal site id
        required: true
        type: choice
        options:
          - lab
          - games
          - kids
          - tools

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build selected portal
        run: npm run build:${{ inputs.site }}
        env:
          IT_LAB_SITE: https://lab.spirzen.ru
          IT_LAB_BASE: /
          IT_GAMES_SITE: https://games.spirzen.ru
          IT_GAMES_BASE: /
          IT_KIDS_SITE: https://kids.spirzen.ru
          IT_KIDS_BASE: /
          IT_TOOLS_SITE: https://tools.spirzen.ru
          IT_TOOLS_BASE: /
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ inputs.site }}
          path: sites/${{ inputs.site }}/dist

  deploy-note:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Reminder
        run: |
          echo "Artifact dist-${{ inputs.site }} uploaded."
          echo "For custom subdomain, deploy to a dedicated repo or enable Cloudflare Pages."
          echo "See docs/DEPLOY.md"
